c:
  ext: c
  image: gcc:latest
  compile: gcc -o /work/main /work/main.c -lm
  run: "/work/main"

cpp:
  ext: cpp
  image: gcc:latest
  compile: gcc -o /work/main /work/main.cpp
  run: "/work/main"

ocaml:
  ext: ml
  image: yodac-sandbox
  compile: opam exec -- ocamlc -o /work/main /work/main.ml
  run: "/work/main"

java:
  ext: java
  image: eclipse-temurin:21
  compile: javac -d /work /work/Main.java
  run: java -cp /work Main

python:
  ext: py
  image: python:3.12-slim
  compile:
  run: python3 /work/main.py

javascript:
  ext: js
  image: node:22-slim
  compile:
  run: node /work/main.js