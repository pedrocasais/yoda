services:
  traefik:
    image: "traefik:latest"
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=proxy"
      - "--entryPoints.web.address=:80"
      - --api.dashboard=true
      - --api.insecure=true
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - proxy
    restart: unless-stopped

  yodab:
    build:
      dockerfile: Containerfile.yodab
    image: yodab-dev
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.yoda-api.rule=Host(`localhost`) && PathPrefix(`/auth`) || PathPrefix(`/admin`) || PathPrefix(`/users`) || PathPrefix(`/contests`) || PathPrefix(`/problems`) || PathPrefix(`/submissions`)"
      - "traefik.http.routers.yoda-api.entrypoints=web"
      - "traefik.http.routers.yoda-api.priority=20"
      - "traefik.http.services.yoda-api.loadbalancer.server.port=8001"
    networks:
      - proxy
    restart: unless-stopped

  yodac:
    build:
      dockerfile: Containerfile.yodac
    image: yodac-dev
    user: "0:0"
    ports:
      - "8081:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/yodac:/var/lib/yodac
    environment:
      YODAC_WORK_ROOT: /var/lib/yodac
    networks:
      - proxy
    restart: unless-stopped

  valkey:
    image: valkey/valkey:latest
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    networks:
      - proxy
    restart: unless-stopped

  yodaw:
    image: ghcr.io/anmaped/yoda-web:latest
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.yodaw.rule=Host(`localhost`)"
      - "traefik.http.routers.yodaw.entrypoints=web"
      - "traefik.http.services.yodaw.loadbalancer.server.port=80"
      - "traefik.http.routers.yodaw.priority=10"
    networks:
      - proxy
    restart: unless-stopped

networks:
  proxy:
    name: proxy

volumes:
  valkey_data:
